---
- name: installa a list of package
  apt:
    pkg:
      - docker.io
      - python3-pip
      - python3-venv
    state: present
    update_cache: true

- name: create venv
  command: python3 -m venv /opt/docker-venv
  args:
    creates: /opt/docker-venv

- name: install docker in venv
  pip:
    name: docker
    virtualenv: /opt/docker-venv

- name: install collection
  command: ansible-galaxy collection install community.docker

- name: run container
  community.docker.docker_container:
    name: wartest
    image: "{{ image }}"
    ports: 8081:8080
    state: started
